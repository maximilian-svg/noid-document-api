openapi: 3.1.0
info:
  title: NOID Document API
  version: 1.0.0
  description: API för att skapa NOID-rapporter från JSON-taggar och DOCX-mallar.

servers:
  - url: https://noid-document-api.onrender.com

paths:
  /template-tags/{template_name}:
    get:
      operationId: getTemplateTags
      summary: Hämta alla taggar i en DOCX-mall
      parameters:
        - name: template_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista med taggar i vald mall
          content:
            application/json:
              schema:
                type: object
                properties:
                  template_name:
                    type: string
                  tag_count:
                    type: integer
                  tags:
                    type: array
                    items:
                      type: string

  /generate-from-json:
    post:
      operationId: generateFromJson
      summary: Generera en NOID-rapport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - template_name
                - output_name
                - tags
              properties:
                template_name:
                  type: string
                output_name:
                  type: string
                tags:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Resultat från rapportgenerering
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  output_path:
                    type: string
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                  leftover_xml_files:
                    type: array
                    items:
                      type: string
                  leftover_tags:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string