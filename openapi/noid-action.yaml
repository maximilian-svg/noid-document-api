openapi: 3.1.0
info:
  title: NOID Document API
  version: 1.0.0
  description: API för att hämta mallar, taggar och generera NOID-rapporter.

servers:
  - url: https://noid-document-api.onrender.com

paths:
  /template-map:
    get:
      operationId: getTemplateMap
      summary: Hämta aktuell mall per rapporttyp
      responses:
        "200":
          description: Mallkarta
          content:
            application/json:
              schema:
                type: object
                required:
                  - Bas
                  - Fokus
                  - Optimal
                  - Återbesök
                properties:
                  Bas:
                    type: string
                  Fokus:
                    type: string
                  Optimal:
                    type: string
                  Återbesök:
                    type: string

  /template-tags/{template_name}:
    get:
      operationId: getTemplateTags
      summary: Hämta alla taggar i en DOCX-mall
      parameters:
        - name: template_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tagglista
          content:
            application/json:
              schema:
                type: object
                properties:
                  template_name:
                    type: string
                  tag_count:
                    type: integer
                  tags:
                    type: array
                    items:
                      type: string

  /required-tags/{template_name}:
    get:
      operationId: getRequiredTags
      summary: Hämta obligatoriska taggar för vald mall
      parameters:
        - name: template_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista med obligatoriska taggar
          content:
            application/json:
              schema:
                type: object
                properties:
                  template_name:
                    type: string
                  required_tag_count:
                    type: integer
                  required_tags:
                    type: array
                    items:
                      type: string

  /generate-from-json:
    post:
      operationId: generateFromJson
      summary: Generera en NOID-rapport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - template_name
                - output_name
                - tags_json
              properties:
                template_name:
                  type: string
                  example: NOID_Rapportmall_Bas_Maskinfyllbar_v13.docx
                output_name:
                  type: string
                  example: test_rapport.docx
                tags_json:
                  type: string
                  description: JSON-sträng med alla taggar och värden
                  example: "{\"CLIENT_NAME\":\"Test Person\",\"REPORT_DATE\":\"11 mars 2026\",\"REPORT_TYPE\":\"Bas\"}"
      responses:
        "200":
          description: Resultat från rapportgenerering
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  output_path:
                    type: string
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                  leftover_xml_files:
                    type: array
                    items:
                      type: string
                  leftover_tags:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string